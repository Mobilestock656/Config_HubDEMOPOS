<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MANAGEMENT HUB — Digital Services Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #FAFAFA;
            --panel-bg: #FFFFFF;
            --primary: #00796B;
            --primary-hover: #004D40;
            --text-main: #1E293B;
            --text-muted: #64748B;
            --border-color: #F1F5F9;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.02);
            --shadow-md: 0 4px 12px -2px rgba(15, 23, 42, 0.04);
            --shadow-xl: 0 20px 25px -5px rgba(15, 23, 42, 0.08), 0 10px 10px -5px rgba(15, 23, 42, 0.03);
        }

        /* 🔒 ล็อกตัวบอดี้เว็บใหญ่คงที่ตายตัว ไม่ให้เลื่อนไถลขึ้นลงเด็ดขาด */
        body {
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg-main);
            margin: 0;
            padding: 0;
            color: var(--text-main);
            height: 100vh;
            max-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden !important;
            -webkit-text-size-adjust: 100%;
            -webkit-tap-highlight-color: transparent;
        }

        /* Minimal Header แบบกระชับไม่กินพื้นที่ */
        .header {
            text-align: center;
            padding: 25px 20px 20px;
            background-color: var(--panel-bg);
            border-bottom: 1px solid #E2E8F0;
            flex-shrink: 0;
        }

        .header .logo-text {
            font-weight: 600;
            font-size: 1.6rem;
            letter-spacing: 1px;
            margin: 0;
            color: #0F172A;
            text-transform: uppercase;
        }

        .header .accent-line {
            width: 35px;
            height: 1px;
            background-color: var(--primary);
            margin: 8px auto;
            opacity: 0.4;
        }

        .header p {
            margin: 2px 0 0 0;
            font-size: 0.75rem;
            font-weight: 400;
            color: var(--text-muted);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* Container สไตล์เว็บระบบใหญ่ คลีน ๆ สบายตา */
        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 20px 30px;
            box-sizing: border-box;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center; /* จัดหน้าตักให้อยู่กึ่งกลางหน้าจออย่างสมดุล */
            overflow: hidden;
        }

        .hub-section { margin-bottom: 25px; }
        .hub-section:last-child { margin-bottom: 0; }

        .section-header {
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            color: var(--primary);
            text-transform: uppercase;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-header::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, #E2E8F0, transparent);
        }

        /* Clean Card Grid สัดส่วนพอดีหน้าจอ */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 15px;
        }

        .card {
            background: var(--panel-bg);
            border: 1px solid #E2E8F0;
            border-radius: 12px;
            padding: 18px 20px;
            display: flex;
            flex-direction: column;
            transition: all 0.2s ease-in-out;
            position: relative;
            box-shadow: var(--shadow-sm);
        }

        .card-link {
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            height: 100%;
            flex: 1;
            cursor: pointer;
        }

        .card:not(.disabled):hover { 
            border-color: #CBD5E1;
            box-shadow: var(--shadow-md);
        }
        .card:not(.disabled):active { transform: scale(0.99); background-color: #FAFAFA; }

        .card.disabled {
            background-color: #F8FAFC;
            opacity: 0.5;
            cursor: not-allowed;
            box-shadow: none;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .card-badge {
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--primary);
            border: 1px solid #E6F4F1;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
            background: #E6F4F1;
        }
        .card.disabled .card-badge { color: #64748B; border-color: #E2E8F0; background: #E2E8F0; }

        .meta-right { display: flex; align-items: center; gap: 8px; }

        .btn-share {
            background: #FAFAFA;
            border: 1px solid #E2E8F0;
            color: var(--text-muted);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s ease;
            z-index: 10;
        }
        .btn-share:hover { background: #F1F5F9; color: #0F172A; }

        .card-icon { font-size: 1.3rem; }
        .card-title { font-size: 1rem; font-weight: 600; color: #0F172A; margin: 0 0 3px 0; }
        .card-desc { font-size: 0.8rem; color: var(--text-muted); line-height: 1.4; margin: 0 0 12px 0; flex: 1; font-weight: 400; }

        /* ขนาดปุ่มฟังก์ชันมินิมอล กระชับ สวยงาม */
        .card-action-btn {
            background-color: var(--primary);
            color: white;
            text-align: center;
            padding: 9px 12px;
            border-radius: 6px;
            font-weight: 500;
            font-size: 0.85rem;
            transition: background-color 0.15s ease;
            margin-top: auto;
            user-select: none;
        }
        .card:not(.disabled):hover .card-action-btn { background-color: var(--primary-hover); }
        .card.disabled .card-action-btn { background-color: #94A3B8; color: #E2E8F0; }

        /* 🎛️ ADJUSTED PREMIUM MODAL OVERLAY STYLES */
        .app-modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(15, 23, 42, 0.35);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: -1; /* ⚡ ปรับค่าเริ่มต้นให้ไปซ่อนอยู่หลังสุดอย่างเด็ดขาด ป้องกันการบล็อกปุ่มหลัก */
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease-out, z-index 0.2s ease-out;
        }
        
        /* 🌟 เมื่อสั่งเปิดหน้าต่าง ค่อยสลับเลเยอร์ขึ้นมาด้านบนสุด */
        .app-modal-overlay.show {
            opacity: 1;
            z-index: 999999;
            pointer-events: auto;
        }
        
        .app-modal-overlay.is-minimized {
            background-color: transparent !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
            pointer-events: none !important;
            z-index: 99999999 !important; /* ดันปุ่มย่อกล่องให้ลอยเด่นขึ้นมาเหนือกริล */
        }
        
        .app-modal-window {
            background-color: #FFFFFF;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            transform: translateY(15px);
            transition: all 0.25s ease-out;
            border: 1px solid #E2E8F0;
            box-shadow: var(--shadow-xl);
            pointer-events: auto;
        }
        
        @media (min-width: 576px) {
            .app-modal-window {
                width: 90%;
                max-width: 460px; 
                height: 82vh;
                max-height: 720px;
                border-radius: 16px;
            }
        }
        
        .app-modal-window.fullscreen {
            width: 100% !important;
            max-width: 100% !important;
            height: 100% !important;
            max-height: 100% !important;
            border-radius: 0px !important;
            top: 0 !important; left: 0 !important; transform: none !important;
        }

        .app-modal-window.minimized {
            position: fixed !important;
            bottom: 20px !important;
            right: 20px !important;
            width: 280px !important;
            height: 52px !important;
            top: auto !important; left: auto !important;
            border-radius: 12px !important;
            transform: none !important;
            box-shadow: 0 10px 25px rgba(15, 23, 42, 0.15);
            border: 1px solid var(--primary);
            pointer-events: auto !important; /* เปิดรับคำสั่งกดขยาย */
        }
        .app-modal-window.minimized .app-modal-body { display: none !important; }
        
        .app-modal-header {
            padding: 12px 20px;
            background-color: #FFFFFF;
            border-bottom: 1px solid #F1F5F9;
            display: flex;
            align-items: center;
            min-height: 52px;
            box-sizing: border-box;
            user-select: none;
        }
        
        .mac-controls { display: flex; gap: 8px; margin-right: 15px; }
        .mac-dot {
            width: 12px; height: 12px; border-radius: 50%; border: none; cursor: pointer;
            position: relative; display: flex; align-items: center; justify-content: center;
            padding: 0; font-size: 8px; font-weight: bold; color: transparent; transition: all 0.15s ease;
        }
        .mac-controls:hover .mac-dot { color: rgba(0,0,0,0.4); }
        .mac-close { background-color: #FF5F56; }
        .mac-minimize { background-color: #FFBD2E; }
        .mac-expand { background-color: #27C93F; }
        
        .app-modal-header h3 { 
            margin: 0; font-size: 0.95rem; font-weight: 500; color: #0F172A;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
        }
        
        .restore-click-zone {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            cursor: pointer; display: none; z-index: 99;
        }
        .app-modal-window.minimized .restore-click-zone { display: block; }

        .app-modal-body { flex: 1; width: 100%; height: 100%; background-color: #FAFAFA; position: relative; -webkit-overflow-scrolling: touch; }
        .app-modal-iframe { width: 100%; height: 100%; border: none; display: block; }

        /* Footer กระชับติดขอบล่างเว็บใหญ่ */
        .footer { 
            text-align: center; 
            padding: 18px 20px; 
            font-size: 0.75rem; 
            color: var(--text-muted); 
            border-top: 1px solid #E2E8F0; 
            background-color: var(--panel-bg);
            flex-shrink: 0;
        }
        .footer span { color: var(--primary); font-weight: 600; }

        #sync-indicator {
            position: fixed; top: 12px; right: 12px; background: rgba(0, 121, 107, 0.9);
            color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.72rem;
            font-weight: 500; display: none; z-index: 99999; box-shadow: var(--shadow-sm);
        }

        .toast { position: fixed; bottom: -60px; left: 50%; transform: translateX(-50%); background: #0F172A; color: white; padding: 10px 24px; border-radius: 30px; font-size: 0.85rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 9999; transition: bottom 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; align-items: center; gap: 10px; font-weight: 500; }
        .toast.show { bottom: 30px; }
    </style>
</head>
<body>

    <div id="sync-indicator">🔄 กำลังอัปเดตระบบ...</div>

    <div class="header">
        <h1 class="logo-text" id="shopTitleDisplay">MIRA HAIR STUDIO</h1>
        <div class="accent-line"></div>
        <p>Management Hub & Digital Services</p>
    </div>

    <div class="container" id="mainContainer">
        <div class="hub-section">
            <div class="section-header">Internal Management System</div>
            <div class="grid" id="internalGrid"></div>
        </div>
        <div class="hub-section">
            <div class="section-header">Exclusive Guest Services</div>
            <div class="grid" id="guestGrid"></div>
        </div>
    </div>

    <div id="appModalOverlay" class="app-modal-overlay">
        <div id="appModalWindow" class="app-modal-window">
            <div class="restore-click-zone" onclick="minimizeAppModal(event, forceRestore=true)"></div>
            <div class="app-modal-header">
                <div class="mac-controls">
                    <button class="mac-dot mac-close" onclick="closeAppModal(true)" title="ปิดหน้าต่าง">✕</button>
                    <button class="mac-dot mac-minimize" onclick="minimizeAppModal(event)" title="ย่อหน้าต่าง">⎯</button>
                    <button class="mac-dot mac-expand" onclick="toggleFullscreenAppModal()" title="ขยายเต็มหน้าจอ">⤢</button>
                </div>
                <h3 id="appModalTitle">ระบบบริการ</h3>
            </div>
            <div class="app-modal-body">
                <iframe id="appModalIframe" class="app-modal-iframe" src="" allow="camera *; geolocation *; microphone *; autoplay; encrypted-media;"></iframe>
            </div>
        </div>
    </div>

    <div class="footer">
        &copy; 2026 <span id="footerShopName">MIRA HAIR STUDIO</span>. All Rights Reserved.
    </div>

    <div id="toastNotification" class="toast">✨ คัดลอกลิงก์เรียบร้อยแล้ว</div>

    <script>
        const Master_GAS_URL = "https://script.google.com/macros/s/AKfycbxrJzwwtaV39NFkc_LH3gkj_wEZjC9fw_e6SZei89tG3GVYuW45pkMCyWu32j6v2v4/exec";

        // ฟังก์ชันสร้างการ์ดระบบ
        function createCard(key, data) {
            const card = document.createElement('div');
            card.className = `card ${!data.active ? 'disabled' : ''}`;
            
            let clickAction = "";
            if (data.active) {
                clickAction = `onclick="openAppModal('${data.url}', '${data.title}', '${key}')"`;
            } else {
                clickAction = `onclick="alert('${data.errorMsg}')"`;
            }

            card.innerHTML = `
                <div class="card-meta">
                    <span class="card-badge">${!data.active ? 'Maintenance' : data.badge}</span>
                    <div class="meta-right">
                        <button class="btn-share" onclick="shareLink(event, '${data.url}')" title="คัดลอกลิงก์">🔗</button>
                        <div class="card-icon">${data.icon}</div>
                    </div>
                </div>
                <a ${clickAction} class="card-link">
                    <h3 class="card-title">${data.title}</h3>
                    <p class="card-desc">${data.desc}</p>
                    <div class="card-action-btn">
                        ${data.active ? 'เปิดเข้าใช้งานระบบ' : 'กำลังปรับปรุงระบบ'}
                    </div>
                </a>
            `;
            return card;
        }

        // ฟังก์ชันเปิดหน้าต่างย่อยซ้อนระบบหลัก
        function openAppModal(url, title, key) {
            const overlay = document.getElementById('appModalOverlay');
            const win = document.getElementById('appModalWindow');
            
            overlay.className = "app-modal-overlay show"; 
            win.className = "app-modal-window"; 
            
            document.getElementById('appModalTitle').innerText = title;
            document.getElementById('appModalIframe').src = url;
            
            let lowerKey = String(key).toLowerCase();
            let lowerUrl = String(url).toLowerCase();
            if (lowerKey.includes('pos') || lowerKey.includes('stock') || lowerUrl.includes('pos') || lowerUrl.includes('stock') || lowerUrl.includes('mobilestock')) {
                win.classList.add('fullscreen');
            }
        }

        // 🔴 ฟังก์ชันปิดหน้าต่างย่อย (ดีดเลเยอร์กลับไปซ่อนอยู่ด้านหลังทันที แก้อาการบล็อกปุ่มหายขาด)
        function closeAppModal(force = false) {
            if (force) {
                const overlay = document.getElementById('appModalOverlay');
                overlay.className = "app-modal-overlay"; // ถอดคลาส show ออกเพื่อเปลี่ยน z-index เป็น -1
                document.getElementById('appModalIframe').src = ""; 
            }
        }

        // 🟡 ฟังก์ชันย่อหน้าต่างย่อยค้างระบบไว้มุมขวาล่าง
        function minimizeAppModal(event, forceRestore = false) {
            if (event) { event.preventDefault(); event.stopPropagation(); }
            const overlay = document.getElementById('appModalOverlay');
            const win = document.getElementById('appModalWindow');
            
            if (win.classList.contains('minimized') || forceRestore) {
                win.classList.remove('minimized');
                overlay.classList.remove('is-minimized');
            } else {
                win.className = "app-modal-window minimized"; 
                overlay.classList.add('is-minimized'); 
            }
        }

        // 🟢 ฟังก์ชันสลับฟูลสกรีน
        function toggleFullscreenAppModal() {
            const win = document.getElementById('appModalWindow');
            if (win.classList.contains('minimized')) return;
            win.classList.toggle('fullscreen');
        }

        function shareLink(event, url) {
            event.preventDefault();
            event.stopPropagation();
            navigator.clipboard.writeText(url).then(() => {
                const toast = document.getElementById('toastNotification');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2500);
            }).catch(() => alert('ไม่สามารถคัดลอกลิงก์ได้'));
        }

        // Render หน้าจอการ์ดปุ่มกด
        function renderHubUI(shopName, resData) {
            const internalGrid = document.getElementById('internalGrid');
            const guestGrid = document.getElementById('guestGrid');

            internalGrid.innerHTML = '';
            guestGrid.innerHTML = '';

            document.getElementById('shopTitleDisplay').innerText = shopName;
            document.getElementById('footerShopName').innerText = shopName.toUpperCase();

            Object.keys(resData).forEach(key => {
                const item = resData[key];
                const cardElement = createCard(key, item);
                
                if (item.type === "staff") {
                    internalGrid.appendChild(cardElement);
                } else if (item.type === "customer") {
                    guestGrid.appendChild(cardElement);
                }
            });
        }

        window.handleHubResponse = function(res) {
            document.getElementById('sync-indicator').style.display = 'none';
            if (res && res.status === "success") {
                const urlParams = new URLSearchParams(window.location.search);
                let shopNameParam = urlParams.get('shop') || 'DEMOPOS';

                renderHubUI(res.shop, res.data);
                localStorage.setItem('hub_cache_' + shopNameParam, JSON.stringify(res));
            }
        };

        document.addEventListener("DOMContentLoaded", function() {
            const urlParams = new URLSearchParams(window.location.search);
            let shopName = urlParams.get('shop') || 'DEMOPOS';
            
            const cachedData = localStorage.getItem('hub_cache_' + shopName);
            if (cachedData) {
                try {
                    const parsed = JSON.parse(cachedData);
                    renderHubUI(parsed.shop, parsed.data);
                } catch(e) { console.log("Cache recovery error."); }
            } else {
                document.getElementById('shopTitleDisplay').innerText = "กำลังซิงค์ข้อมูล...";
            }

            document.getElementById('sync-indicator').style.display = 'block';
            
            const connector = Master_GAS_URL.includes('?') ? '&' : '?';
            const jsonpUrl = `${Master_GAS_URL}${connector}action=getHubConfig&shop=${encodeURIComponent(shopName)}&callback=handleHubResponse`;

            const script = document.createElement('script');
            script.src = jsonpUrl;
            script.onerror = function() {
                document.getElementById('sync-indicator').style.display = 'none';
            };
            document.body.appendChild(script);
        });
    </script>
</body>
</html>
