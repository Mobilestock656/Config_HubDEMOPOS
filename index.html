<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MANAGEMENT HUB — Digital Services Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght=200;300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #F8FAFC;
            --panel-bg: #FFFFFF;
            --primary: #00796B;
            --primary-hover: #004D40;
            --text-main: #0F172A;
            --text-muted: #64748B;
            --border-color: #E2E8F0;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.05), 0 4px 6px -2px rgba(0,0,0,0.02);
            --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg-main);
            margin: 0;
            padding: 0;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            -webkit-text-size-adjust: 100%;
            -webkit-tap-highlight-color: transparent;
        }

        /* Minimal Header */
        .header {
            text-align: center;
            padding: 40px 20px;
            background-color: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
        }

        .header .logo-text {
            font-weight: 600;
            font-size: 2rem;
            letter-spacing: 1px;
            margin: 0;
            color: var(--text-main);
            text-transform: uppercase;
        }

        .header .accent-line {
            width: 50px;
            height: 1px;
            background-color: var(--primary);
            margin: 15px auto;
            opacity: 0.3;
        }

        .header p {
            margin: 6px 0 0 0;
            font-size: 0.85rem;
            font-weight: 400;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Main Container */
        .container {
            max-width: 1140px;
            width: 100%;
            margin: 30px auto 60px;
            padding: 0 20px;
            box-sizing: border-box;
            flex: 1;
            opacity: 0;
            transition: opacity 0.4s ease;
            display: none;
        }
        .container.loaded { 
            display: block;
            opacity: 1; 
        }

        .hub-section { margin-bottom: 40px; }

        .section-header {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--primary);
            text-transform: uppercase;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-header::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--border-color), transparent);
        }

        /* Responsive Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        @media (min-width: 768px) and (max-width: 1024px) {
            .grid { grid-template-columns: repeat(2, 1fr) !important; }
        }

        .card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            box-shadow: var(--shadow-sm);
        }

        .card-link {
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            height: 100%;
            flex: 1;
            cursor: pointer;
        }

        .card:not(.disabled):hover { border-color: #CBD5E1; }
        .card:not(.disabled):active { transform: scale(0.98); background-color: #F8FAFC; }

        .card.disabled {
            background-color: #F1F5F9;
            opacity: 0.55;
            cursor: not-allowed;
            border-color: var(--border-color);
            box-shadow: none;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .card-badge {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--primary);
            border: 1px solid #CCFBF1;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
            background: #E6F4F1;
        }
        .card.disabled .card-badge { color: #DC2626; border-color: #FEE2E2; background: #FEE2E2; }

        .meta-right { display: flex; align-items: center; gap: 12px; }

        .btn-share {
            background: #F8FAFC;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            z-index: 10;
        }
        .btn-share:active { background: #E2E8F0; }

        .card-icon { font-size: 1.6rem; }
        .card-title { font-size: 1.15rem; font-weight: 600; color: var(--text-main); margin: 0 0 8px 0; }
        .card-desc { font-size: 0.88rem; color: var(--text-muted); line-height: 1.5; margin: 0 0 20px 0; flex: 1; font-weight: 300; }

        .card-action-btn {
            background-color: var(--primary);
            color: white;
            text-align: center;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: background-color 0.15s ease;
            margin-top: auto;
            box-shadow: 0 2px 4px rgba(0, 121, 107, 0.1);
            user-select: none;
        }
        .card:not(.disabled):hover .card-action-btn { background-color: var(--primary-hover); }
        .card:not(.disabled):active .card-action-btn { background-color: var(--primary-hover); opacity: 0.9; }
        .card.disabled .card-action-btn { background-color: #94A3B8; color: #E2E8F0; box-shadow: none; }

        /* 📱 LUXURY MODAL POPUP (ปรับโครงสร้างปุ่มปิดใหม่แยกเป็นอิสระ) */
        .app-modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }
        .app-modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .app-modal-window {
            background-color: #FFFFFF;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transform: translateY(30px);
            transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        @media (min-width: 576px) {
            .app-modal-window {
                width: 90%;
                max-width: 480px; 
                height: 90vh; /* 🌟 ขยายความสูงเพิ่มขึ้นเพื่อแก้ปัญหากรณีจอสั้น */
                max-height: 800px;
                border-radius: 24px;
                border: 1px solid var(--border-color);
                box-shadow: var(--shadow-xl);
                transform: translateY(20px) scale(0.98);
            }
        }
        
        .app-modal-header {
            padding: 16px 20px;
            background-color: #FFFFFF;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 60px;
            box-sizing: border-box;
            position: relative;
            z-index: 9999999; /* 🌟 ดันหัวตารางให้อยู่ด้านบนสุดเสมอเพื่อป้องกัน iFrame ทับซ้อน */
        }
        .app-modal-header h3 { margin: 0; font-size: 1.1rem; font-weight: 600; color: var(--text-main); }
        
        /* 🌟 ปรับปรุงปุ่มปิด (กากบาท) ให้แยกเลเยอร์ออกมาตัดขาดเพื่อป้องกันการกดไม่ติด */
        .app-modal-close-btn {
            background-color: #F1F5F9;
            border: none;
            color: var(--text-main);
            width: 38px;
            height: 38px;
            border-radius: 50%;
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            position: relative;
            z-index: 100;
        }
        .app-modal-close-btn:active { background-color: #CBD5E1; transform: scale(0.92); }
        
        .app-modal-body {
            flex: 1;
            width: 100%;
            height: 100%;
            background-color: #F8FAFC;
            position: relative;
            -webkit-overflow-scrolling: touch;
        }
        .app-modal-iframe { width: 100%; height: 100%; border: none; display: block; }

        /* Clean Footer */
        .footer { 
            text-align: center; 
            padding: 24px 20px; 
            font-size: 0.8rem; 
            color: var(--text-muted); 
            border-top: 1px solid var(--border-color); 
            background-color: var(--panel-bg);
        }
        .footer span { color: var(--primary); font-weight: 600; }

        /* Minimal Loader */
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #FFFFFF; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 99999; transition: opacity 0.4s ease; }
        .spinner { width: 36px; height: 36px; border: 3px solid #E2E8F0; border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #loader p { color: var(--primary); margin-top: 16px; font-weight: 500; font-size: 0.85rem; letter-spacing: 1px; }

        .toast { position: fixed; bottom: -60px; left: 50%; transform: translateX(-50%); background: #0F172A; color: white; padding: 12px 28px; border-radius: 30px; font-size: 0.88rem; box-shadow: 0 10px 25px rgba(0,0,0,0.15); z-index: 9999; transition: bottom 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; align-items: center; gap: 10px; font-weight: 500; white-space: nowrap; }
        .toast.show { bottom: 30px; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p>กำลังโหลดระบบ...</p>
    </div>

    <div class="header">
        <h1 class="logo-text" id="shopTitleDisplay">MIRA HAIR STUDIO</h1>
        <div class="accent-line"></div>
        <p>Management Hub & Digital Services</p>
    </div>

    <div class="container" id="mainContainer">
        <div class="hub-section">
            <div class="section-header">Internal Management System</div>
            <div class="grid" id="internalGrid"></div>
        </div>
        <div class="hub-section">
            <div class="section-header">Exclusive Guest Services</div>
            <div class="grid" id="guestGrid"></div>
        </div>
    </div>

    <div id="appModalOverlay" class="app-modal-overlay" onclick="closeAppModal(event)">
        <div class="app-modal-window" onclick="event.stopPropagation()">
            <div class="app-modal-header">
                <h3 id="appModalTitle">ระบบบริการ</h3>
                <button class="app-modal-close-btn" onclick="closeAppModal(force=true)">&times;</button>
            </div>
            <div class="app-modal-body">
                <iframe id="appModalIframe" class="app-modal-iframe" src="" allow="camera *; geolocation *; microphone *; autoplay; encrypted-media;"></iframe>
            </div>
        </div>
    </div>

    <div class="footer">
        &copy; 2026 <span id="footerShopName">MIRA HAIR STUDIO</span>. All Rights Reserved.
    </div>

    <div id="toastNotification" class="toast">✨ คัดลอกลิงก์เรียบร้อยแล้ว</div>

    <script>
        // ลิงก์กลาง Master Apps Script API ของคุณ
        const Master_GAS_URL = "https://script.google.com/macros/s/AKfycbxrJzwwtaV39NFkc_LH3gkj_wEZjC9fw_e6SZei89tG3GVYuW45pkMCyWu32j6v2v4/exec";

        // ฟังก์ชันสร้างการ์ดระบบ
        function createCard(key, data) {
            const card = document.createElement('div');
            card.className = `card ${!data.active ? 'disabled' : ''}`;
            
            let clickAction = "";
            if (data.active) {
                if (key === 'attendance' || key === 'coupon' || key === 'booking') {
                    clickAction = `onclick="openAppModal('${data.url}', '${data.title}')"`;
                } else {
                    clickAction = `href="${data.url}" target="_blank"`;
                }
            } else {
                clickAction = `onclick="alert('${data.errorMsg}')"`;
            }

            card.innerHTML = `
                <div class="card-meta">
                    <span class="card-badge">${!data.active ? 'Maintenance' : data.badge}</span>
                    <div class="meta-right">
                        <button class="btn-share" onclick="shareLink(event, '${data.url}')" title="คัดลอกลิงก์">🔗</button>
                        <div class="card-icon">${data.icon}</div>
                    </div>
                </div>
                <a ${clickAction} class="card-link">
                    <h3 class="card-title">${data.title}</h3>
                    <p class="card-desc">${data.desc}</p>
                    <div class="card-action-btn">
                        ${data.active ? 'เปิดเข้าใช้งานระบบ' : 'กำลังปรับปรุงระบบ'}
                    </div>
                </a>
            `;
            return card;
        }

        // ฟังก์ชันเปิดหน้าต่างย่อยซ้อนระบบหลัก
        function openAppModal(url, title) {
            document.getElementById('appModalTitle').innerText = title;
            document.getElementById('appModalIframe').src = url;
            document.getElementById('appModalOverlay').classList.add('show');
            
            document.body.style.position = 'fixed';
            document.body.style.width = '100%';
        }

        // ฟังก์ชันปิดหน้าต่างย่อย
        function closeAppModal(event = null, force = false) {
            if (force || event.target.id === "appModalOverlay") {
                document.getElementById('appModalOverlay').classList.remove('show');
                document.getElementById('appModalIframe').src = ""; 
                
                document.body.style.position = '';
                document.body.style.width = '';
            }
        }

        // ฟังก์ชันแชร์ลิงก์
        function shareLink(event, url) {
            event.preventDefault();
            event.stopPropagation();
            navigator.clipboard.writeText(url).then(() => {
                const toast = document.getElementById('toastNotification');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2500);
            }).catch(() => alert('ไม่สามารถคัดลอกลิงก์ได้'));
        }

        // ฟังก์ชันหลักเมื่อได้รับข้อมูลจาก Google Apps Script
        window.handleHubResponse = function(res) {
            if (res && res.status === "success") {
                const config = res.data;
                const internalGrid = document.getElementById('internalGrid');
                const guestGrid = document.getElementById('guestGrid');

                internalGrid.innerHTML = '';
                guestGrid.innerHTML = '';

                document.getElementById('shopTitleDisplay').innerText = res.shop;
                document.getElementById('footerShopName').innerText = res.shop.toUpperCase();

                Object.keys(config).forEach(key => {
                    const item = config[key];
                    const cardElement = createCard(key, item);
                    
                    if (item.type === "staff") {
                        internalGrid.appendChild(cardElement);
                    } else if (item.type === "customer") {
                        guestGrid.appendChild(cardElement);
                    }
                });

                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('mainContainer').classList.add('loaded');
                }, 400);
            } else {
                alert("เกิดข้อผิดพลาดจากฝั่งสเปรดชีต: " + (res ? res.msg : 'Unknown'));
            }
        };

        // ดึงข้อมูลแบบเทคนิค JSONP ป้องกัน CORS
        document.addEventListener("DOMContentLoaded", function() {
            const urlParams = new URLSearchParams(window.location.search);
            let shopName = urlParams.get('shop') || 'DEMOPOS';
            
            const connector = Master_GAS_URL.includes('?') ? '&' : '?';
            const jsonpUrl = `${Master_GAS_URL}${connector}action=getHubConfig&shop=${encodeURIComponent(shopName)}&callback=handleHubResponse`;

            const script = document.createElement('script');
            script.src = jsonpUrl;
            script.onerror = function() {
                alert("การเชื่อมต่อล้มเหลว กรุณาตรวจสอบสถานะสิทธิ์การตั้งค่าแชร์ในกูเกิลชีต หรือยืนยันรหัส Deployment ใหม่ของระบบ");
            };
            document.body.appendChild(script);
        });
    </script>
</body>
</html>
