<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MANAGEMENT HUB — Digital Services Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #F8FAFC;
            --panel-bg: #FFFFFF;
            --primary: #00796B;
            --text-main: #0F172A;
            --text-muted: #64748B;
            --border-color: #E2E8F0;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.05), 0 4px 6px -2px rgba(0,0,0,0.02);
            --shadow-xl: 0 20px 25px -5px rgba(15, 23, 42, 0.08), 0 10px 10px -5px rgba(15, 23, 42, 0.03);
        }

        /* 📱 ปลดล็อกให้เลื่อนขึ้นลงได้เมื่ออยู่บนมือถือ หรือหน้าจอที่มีขนาดเล็ก */
        body {
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg-main);
            margin: 0;
            padding: 0;
            color: var(--text-main);
            min-height: 100vh; /* ปรับให้ยืดหยุ่น ไม่บล็อกตายตัวที่ 100vh */
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            overflow-y: auto; /* ยอมให้เลื่อนขึ้นลงได้ */
            -webkit-text-size-adjust: 100%;
            -webkit-tap-highlight-color: transparent;
        }

        /* 🔒 ล็อกหน้าจอหลังบ้านทันทีที่เปิดหน้าต่างซ้อน ป้องกันบั๊กเลื่อนแล้วกดปุ่มไม่ติด */
        body.modal-open {
            overflow: hidden !important;
            height: 100vh;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 30px 20px 20px;
            background-color: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            flex-shrink: 0;
        }
        .header .logo-text { font-weight: 600; font-size: clamp(1.5rem, 4vh, 2rem); letter-spacing: 1px; margin: 0; color: var(--text-main); text-transform: uppercase; }
        .header .accent-line { width: 50px; height: 2px; background-color: var(--primary); margin: 10px auto; opacity: 0.5; border-radius: 2px; }
        .header p { margin: 0; font-size: clamp(0.7rem, 1.5vh, 0.85rem); font-weight: 400; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; }

        /* Container */
        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 30px 20px 40px;
            box-sizing: border-box;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .container.loaded { opacity: 1; }

        .hub-section { margin-bottom: 30px; display: flex; flex-direction: column; justify-content: center; }
        .hub-section:last-child { margin-bottom: 0; }
        .section-header { font-size: clamp(0.8rem, 2vh, 1rem); font-weight: 600; letter-spacing: 1px; color: var(--primary); text-transform: uppercase; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
        .section-header::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--border-color), transparent); }

        /* ระบบ Grid อัตโนมัติสไตล์ App Icon */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            justify-content: center;
        }

        .card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            box-shadow: var(--shadow-sm);
            text-decoration: none;
            color: inherit;
            cursor: pointer;
        }
        .card:not(.disabled):hover { transform: translateY(-3px) scale(1.02); box-shadow: var(--shadow-md); border-color: var(--primary); }
        .card:not(.disabled):active { transform: scale(0.97); background-color: #F8FAFC; }
        .card.disabled { background-color: #F1F5F9; opacity: 0.6; cursor: not-allowed; box-shadow: none; }

        .card-meta { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; align-items: center; pointer-events: none; }
        .card-badge { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--primary); padding: 2px 8px; border-radius: 12px; font-weight: 600; background: #E6F4F1; }
        .card.disabled .card-badge { color: #DC2626; background: #FEE2E2; }

        .btn-share { background: transparent; border: none; color: var(--text-muted); font-size: 1rem; cursor: pointer; pointer-events: auto; padding: 0; transition: transform 0.2s; }
        .btn-share:hover { transform: scale(1.2); color: var(--text-main); }

        .card-icon { font-size: clamp(2.2rem, 5vh, 2.8rem); margin: 15px 0 10px 0; }
        .card-title { font-size: 0.9rem; font-weight: 600; color: var(--text-main); margin: 0; line-height: 1.3; }

        /* 🎛️ LUXURY MODAL OVERLAY STYLES */
        .app-modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
            display: none; align-items: center; justify-content: center;
            z-index: 999999; opacity: 0; transition: opacity 0.2s ease-out;
        }
        .app-modal-overlay.show { display: flex !important; opacity: 1; pointer-events: auto; }
        .app-modal-overlay.is-minimized {
            background-color: transparent !important; backdrop-filter: none !important; -webkit-backdrop-filter: none !important;
            display: block !important; pointer-events: none !important; z-index: 99999999 !important;
        }
        
        .app-modal-window {
            background-color: #FFFFFF; width: 100%; height: 100%; display: flex; flex-direction: column; overflow: hidden;
            position: relative; transform: translateY(20px); transition: all 0.25s ease-out;
            border: 1px solid #E2E8F0; box-shadow: var(--shadow-xl); pointer-events: auto;
        }
        
        @media (min-width: 576px) {
            .app-modal-window { width: 90%; max-width: 460px; height: 82vh; max-height: 720px; border-radius: 16px; }
        }
        
        .app-modal-window.fullscreen {
            width: 100% !important; max-width: 100% !important; height: 100% !important; max-height: 100% !important;
            border-radius: 0px !important; top: 0 !important; left: 0 !important; transform: none !important;
        }

        .app-modal-window.minimized {
            position: fixed !important; bottom: 20px !important; right: 20px !important; width: 280px !important; height: 52px !important;
            top: auto !important; left: auto !important; border-radius: 12px !important; transform: none !important;
            box-shadow: 0 10px 25px rgba(15, 23, 42, 0.15); border: 1px solid var(--primary); pointer-events: auto !important;
        }
        .app-modal-window.minimized .app-modal-body { display: none !important; }
        
        .app-modal-header { padding: 12px 20px; background-color: #FFFFFF; border-bottom: 1px solid #F1F5F9; display: flex; align-items: center; min-height: 52px; box-sizing: border-box; user-select: none; }
        .mac-controls { display: flex; gap: 8px; margin-right: 15px; }
        .mac-dot { width: 12px; height: 12px; border-radius: 50%; border: none; cursor: pointer; position: relative; display: flex; align-items: center; justify-content: center; padding: 0; font-size: 8px; font-weight: bold; color: transparent; transition: all 0.15s ease; }
        .mac-controls:hover .mac-dot { color: rgba(0,0,0,0.4); }
        .mac-close { background-color: #FF5F56; }
        .mac-minimize { background-color: #FFBD2E; }
        .mac-expand { background-color: #27C93F; }
        
        .app-modal-header h3 { margin: 0; font-size: 0.95rem; font-weight: 500; color: #0F172A; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
        .restore-click-zone { position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: pointer; display: none; z-index: 99; }
        .app-modal-window.minimized .restore-click-zone { display: block; }
        .app-modal-body { flex: 1; width: 100%; height: 100%; background-color: #FAFAFA; position: relative; -webkit-overflow-scrolling: touch; }
        .app-modal-iframe { width: 100%; height: 100%; border: none; display: block; }

        /* Footer */
        .footer { text-align: center; padding: 20px; font-size: 0.8rem; color: var(--text-muted); border-top: 1px solid var(--border-color); background-color: var(--panel-bg); flex-shrink: 0; }
        .footer span { color: var(--primary); font-weight: 600; }

        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #FFFFFF; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 99999; transition: opacity 0.4s ease; }
        .spinner { width: 36px; height: 36px; border: 3px solid #E2E8F0; border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #loader p { color: var(--primary); margin-top: 15px; font-weight: 500; font-size: 0.85rem; letter-spacing: 1px; }

        .toast { position: fixed; bottom: -60px; left: 50%; transform: translateX(-50%); background: #0F172A; color: white; padding: 10px 24px; border-radius: 30px; font-size: 0.85rem; box-shadow: 0 10px 25px rgba(0,0,0,0.15); z-index: 9999; transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; align-items: center; gap: 10px; font-weight: 500; }
        .toast.show { bottom: 4vh; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p>กำลังเตรียมระบบ...</p>
    </div>

    <div class="header">
        <h1 class="logo-text" id="shopTitleDisplay">MANAGEMENT HUB</h1>
        <div class="accent-line"></div>
        <p>Digital Services Platform</p>
    </div>

    <div class="container" id="mainContainer">
        <div class="hub-section">
            <div class="section-header">Internal Management</div>
            <div class="grid" id="internalGrid"></div>
        </div>
        <div class="hub-section" id="guestSection" style="display: none;">
            <div class="section-header">Guest Services</div>
            <div class="grid" id="guestGrid"></div>
        </div>
    </div>

    <div id="appModalOverlay" class="app-modal-overlay">
        <div id="appModalWindow" class="app-modal-window">
            <div class="restore-click-zone" onclick="minimizeAppModal(event, true)"></div>
            <div class="app-modal-header">
                <div class="mac-controls">
                    <button class="mac-dot mac-close" onclick="closeAppModal(true)" title="ปิดหน้าต่าง">✕</button>
                    <button class="mac-dot mac-minimize" onclick="minimizeAppModal(event)" title="ย่อหน้าต่าง">⎯</button>
                    <button class="mac-dot mac-expand" onclick="toggleFullscreenAppModal()" title="ขยายเต็มหน้าจอ">⤢</button>
                </div>
                <h3 id="appModalTitle">ระบบบริการ</h3>
            </div>
            <div class="app-modal-body">
                <iframe id="appModalIframe" class="app-modal-iframe" src="" allow="camera *; geolocation *; microphone *; autoplay; encrypted-media;"></iframe>
            </div>
        </div>
    </div>

    <div class="footer">
        &copy; 2026 <span id="footerShopName">DEMOPOS</span>. All Rights Reserved.
    </div>

    <div id="toastNotification" class="toast">✨ คัดลอกลิงก์แล้ว</div>

    <script>
        // ลิงก์กลาง Master Apps Script API ของคุณ
        const Master_GAS_URL = "https://script.google.com/macros/s/AKfycbxrJzwwtaV39NFkc_LH3gkj_wEZjC9fw_e6SZei89tG3GVYuW45pkMCyWu32j6v2v4/exec";

        // ฟังก์ชันสร้างการ์ดแอปพลิเคชัน
        function createCard(key, data) {
            const card = document.createElement('a');
            card.className = `card ${!data.active ? 'disabled' : ''}`;
            card.href = "javascript:void(0)";
            
            if (data.active) {
                card.onclick = function() { openAppModal(data.url, data.title, key); };
            } else {
                card.onclick = function() { alert(data.errorMsg); };
            }

            card.innerHTML = `
                <div class="card-meta">
                    <span class="card-badge">${!data.active ? 'Maintenance' : data.badge}</span>
                    <button class="btn-share" onclick="shareLink(event, '${data.url}')" title="คัดลอกลิงก์">🔗</button>
                </div>
                <div class="card-icon">${data.icon}</div>
                <h3 class="card-title">${data.title}</h3>
            `;
            return card;
        }

        // 🌟 เปิดหน้าต่างซ้อนและล็อกหน้าจอหลัก
        function openAppModal(url, title, key) {
            const overlay = document.getElementById('appModalOverlay');
            const win = document.getElementById('appModalWindow');
            
            overlay.className = "app-modal-overlay show"; 
            win.className = "app-modal-window"; 
            
            document.getElementById('appModalTitle').innerText = title;
            document.getElementById('appModalIframe').src = url;
            
            let lowerKey = String(key).toLowerCase();
            let lowerUrl = String(url).toLowerCase();
            if (lowerKey.includes('pos') || lowerKey.includes('stock') || lowerUrl.includes('pos') || lowerUrl.includes('stock') || lowerUrl.includes('mobilestock')) {
                win.classList.add('fullscreen');
            }

            // ล็อกหน้าจอด้านหลังทันทีเพื่อป้องกันการเลื่อนแล้วกดไม่ติด
            document.body.classList.add('modal-open');
        }

        // 🔴 ปิดหน้าต่างซ้อนและปลดล็อกหน้าจอหลัก
        function closeAppModal(force = false) {
            if (force) {
                const overlay = document.getElementById('appModalOverlay');
                overlay.className = "app-modal-overlay"; 
                document.getElementById('appModalIframe').src = ""; 
                
                // คืนค่าให้หน้าจอหลักเลื่อนได้ตามปกติ
                document.body.classList.remove('modal-open');
            }
        }

        // 🟡 ย่อ/ขยายหน้าต่าง
        function minimizeAppModal(event, forceRestore = false) {
            if (event) { event.preventDefault(); event.stopPropagation(); }
            const overlay = document.getElementById('appModalOverlay');
            const win = document.getElementById('appModalWindow');
            
            if (win.classList.contains('minimized') || forceRestore) {
                win.classList.remove('minimized');
                overlay.classList.remove('is-minimized');
                document.body.classList.add('modal-open'); // ล็อกจอหลังไว้เหมือนเดิมตอนขยายขึ้นมา
            } else {
                win.className = "app-modal-window minimized"; 
                overlay.classList.add('is-minimized'); 
                document.body.classList.remove('modal-open'); // ปลดล็อกจอหลังให้กดแอปอื่นได้ชั่วคราว
            }
        }

        function toggleFullscreenAppModal() {
            const win = document.getElementById('appModalWindow');
            if (win.classList.contains('minimized')) return;
            win.classList.toggle('fullscreen');
        }

        function shareLink(event, url) {
            event.preventDefault();
            event.stopPropagation();
            navigator.clipboard.writeText(url).then(() => {
                const toast = document.getElementById('toastNotification');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2500);
            }).catch(() => alert('ไม่สามารถคัดลอกลิงก์ได้'));
        }

        window.handleHubResponse = function(res) {
            if (res && res.status === "success") {
                const config = res.data;
                const internalGrid = document.getElementById('internalGrid');
                const guestGrid = document.getElementById('guestGrid');
                const guestSection = document.getElementById('guestSection');

                internalGrid.innerHTML = '';
                guestGrid.innerHTML = '';
                let hasGuestItems = false;

                document.getElementById('shopTitleDisplay').innerText = res.shop;
                document.getElementById('footerShopName').innerText = res.shop.toUpperCase();

                Object.keys(config).forEach(key => {
                    const item = config[key];
                    const cardElement = createCard(key, item);
                    
                    if (item.type === "staff") {
                        internalGrid.appendChild(cardElement);
                    } else if (item.type === "customer") {
                        guestGrid.appendChild(cardElement);
                        hasGuestItems = true;
                    }
                });

                if(hasGuestItems) {
                    guestSection.style.display = "flex";
                }

                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('mainContainer').classList.add('loaded');
                }, 400);
            } else {
                alert("เกิดข้อผิดพลาด: " + (res ? res.msg : 'Unknown'));
            }
        };

        document.addEventListener("DOMContentLoaded", function() {
            const urlParams = new URLSearchParams(window.location.search);
            let shopName = urlParams.get('shop') || 'DEMOPOS';
            
            const connector = Master_GAS_URL.includes('?') ? '&' : '?';
            const jsonpUrl = `${Master_GAS_URL}${connector}action=getHubConfig&shop=${encodeURIComponent(shopName)}&callback=handleHubResponse`;

            const script = document.createElement('script');
            script.src = jsonpUrl;
            script.onerror = function() {
                alert("การเชื่อมต่อล้มเหลว กรุณาตรวจสอบสถานะสิทธิ์การตั้งค่าแชร์ในกูเกิลชีต");
            };
            document.body.appendChild(script);
        });
    </script>
</body>
</html>
