<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIRA HAIR STUDIO — Premium Management Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1e2f 100%);
            --panel-bg: rgba(255, 255, 255, 0.03);
            --panel-border: rgba(255, 255, 255, 0.08);
            --gold-primary: #d4af37;
            --gold-hover: #f3e5ab;
            --gold-gradient: linear-gradient(135deg, #b38728 0%, #fbf5b7 50%, #daa520 100%);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-blur: blur(16px);
        }

        body {
            font-family: 'Prompt', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            margin: 0;
            padding: 0;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        body::before, body::after {
            content: '';
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.05) 0%, transparent 70%);
            z-index: -1;
        }
        body::before { top: -50px; left: -50px; }
        body::after { bottom: -50px; right: -50px; }

        .header {
            text-align: center;
            padding: 60px 20px 40px;
        }

        .header .logo-text {
            font-weight: 200;
            font-size: 2.2rem;
            letter-spacing: 4px;
            margin: 0;
            text-transform: uppercase;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header .accent-line {
            width: 60px;
            height: 1px;
            background: var(--gold-primary);
            margin: 20px auto;
            opacity: 0.6;
        }

        .header p {
            margin: 0;
            font-size: 0.95rem;
            font-weight: 300;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        .container {
            max-width: 1100px;
            width: 100%;
            margin: 0 auto 60px;
            padding: 0 24px;
            box-sizing: border-box;
            flex: 1;
            opacity: 0;
            transition: opacity 0.6s ease;
            display: none; /* ซ่อนไว้ก่อนจนกว่าข้อมูลจะโหลดเสร็จ */
        }
        .container.loaded { 
            display: block;
            opacity: 1; 
        }

        .hub-section { margin-bottom: 50px; }

        .section-header {
            font-size: 1.05rem;
            font-weight: 500;
            letter-spacing: 2px;
            color: var(--gold-primary);
            text-transform: uppercase;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .section-header::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, rgba(212, 175, 55, 0.2), transparent);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--panel-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .card-link {
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            height: 100%;
            flex: 1;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.03) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .card:not(.disabled):hover {
            transform: translateY(-5px);
            border-color: rgba(212, 175, 55, 0.4);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(212, 175, 55, 0.1);
        }

        .card:not(.disabled):hover::before { opacity: 1; }

        .card.disabled {
            opacity: 0.35;
            cursor: not-allowed;
            border-color: rgba(255, 255, 255, 0.02);
        }
        .card.disabled .card-action { color: #ef4444; }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-badge {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--gold-primary);
            border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 500;
            background: rgba(212, 175, 55, 0.02);
        }
        .card.disabled .card-badge { color: #ef4444; border-color: rgba(239, 68, 68, 0.3); }

        .meta-right { display: flex; align-items: center; gap: 12px; }

        .btn-share {
            background: transparent;
            border: 1px solid rgba(212, 175, 55, 0.2);
            color: var(--gold-primary);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            z-index: 10;
        }
        .btn-share:hover { background: rgba(212, 175, 55, 0.1); border-color: var(--gold-primary); transform: scale(1.05); }

        .card-icon { font-size: 1.8rem; opacity: 0.8; transition: transform 0.4s ease; }
        .card:not(.disabled):hover .card-icon { transform: scale(1.1); opacity: 1; }

        .card-title { font-size: 1.25rem; font-weight: 500; color: var(--text-main); margin: 0 0 12px 0; letter-spacing: 0.5px; }
        .card-desc { font-size: 0.9rem; color: var(--text-muted); line-height: 1.6; margin: 0 0 25px 0; flex: 1; font-weight: 300; }

        .card-action {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--gold-primary);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: auto;
            transition: color 0.3s ease;
        }
        .card-action-arrow { transition: transform 0.3s ease; }
        .card:not(.disabled):hover .card-action { color: var(--gold-hover); }
        .card:not(.disabled):hover .card-action-arrow { transform: translateX(5px); }

        /* Luxury Loader */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            transition: opacity 0.5s ease;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 2px solid rgba(212, 175, 55, 0.1);
            border-top: 2px solid var(--gold-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #loader p { color: var(--gold-primary); margin-top: 20px; font-weight: 300; font-size: 0.85rem; letter-spacing: 2px; }

        .footer { text-align: center; padding: 30px 20px; font-size: 0.8rem; color: var(--text-muted); border-top: 1px solid rgba(255, 255, 255, 0.03); letter-spacing: 1px; font-weight: 300; }
        .footer span { color: var(--gold-primary); }

        .toast { position: fixed; bottom: -60px; left: 50%; transform: translateX(-50%); background: rgba(15, 23, 42, 0.9); border: 1px solid var(--gold-primary); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); color: var(--text-main); padding: 12px 24px; border-radius: 30px; font-size: 0.9rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 9999; transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; align-items: center; gap: 10px; }
        .toast.show { bottom: 40px; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p>LOADING EXPERIENCE...</p>
    </div>

    <div class="header">
        <h1 class="logo-text" id="shopTitleDisplay">Mira Hair Studio</h1>
        <div class="accent-line"></div>
        <p>PREMIUM MANAGEMENT HUB & DIGITAL SERVICES</p>
    </div>

    <div class="container" id="mainContainer">
        <div class="hub-section">
            <div class="section-header">Internal Management System</div>
            <div class="grid" id="internalGrid"></div>
        </div>
        <div class="hub-section">
            <div class="section-header">Exclusive Guest Services</div>
            <div class="grid" id="guestGrid"></div>
        </div>
    </div>

    <div class="footer">
        &copy; 2026 <span id="footerShopName">MIRA HAIR STUDIO</span>. All Rights Reserved.
    </div>

    <div id="toastNotification" class="toast">✨ คัดลอกลิงก์ไปยังคลิปบอร์ดเรียบร้อยแล้ว</div>

    <script>
        // 🔗 ดึงข้อมูลผ่าน URL API ที่ระบบให้มาโดยตรงเพื่อป้องกันการพิมพ์ผิดพลาด
        const Master_GAS_URL = "https://script.google.com/macros/s/AKfycbxrJzwwtaV39NFkc_LH3gkj_wEZjC9fw_e6SZei89tG3GVYuW45pkMCyWu32j6v2v4/exec";

        // ฟังก์ชันสร้างการ์ดระบบ
        function createCard(data) {
            const card = document.createElement('div');
            card.className = `card ${!data.active ? 'disabled' : ''}`;
            card.innerHTML = `
                <div class="card-meta">
                    <span class="card-badge">${!data.active ? 'Maintenance' : data.badge}</span>
                    <div class="meta-right">
                        <button class="btn-share" onclick="shareLink(event, '${data.url}')" title="คัดลอกลิงก์">🔗</button>
                        <div class="card-icon">${data.icon}</div>
                    </div>
                </div>
                <a href="${data.active ? data.url : 'javascript:void(0);'}" ${data.active ? 'target="_blank"' : `onclick="alert('${data.errorMsg}')"`} class="card-link">
                    <h3 class="card-title">${data.title}</h3>
                    <p class="card-desc">${data.desc}</p>
                    <div class="card-action">
                        ${data.active ? 'เข้าสู่ระบบบริการ <span class="card-action-arrow">→</span>' : '💥 กำลังปรับปรุงระบบ'}
                    </div>
                </a>
            `;
            return card;
        }

        // ฟังก์ชันแชร์ลิงก์
        function shareLink(event, url) {
            event.preventDefault();
            event.stopPropagation();
            navigator.clipboard.writeText(url).then(() => {
                const toast = document.getElementById('toastNotification');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2500);
            }).catch(() => alert('ไม่สามารถคัดลอกลิงก์ได้'));
        }

        // ประมวลผลดึงข้อมูลแยกรายร้านค้าแบบ Dynamic
        document.addEventListener("DOMContentLoaded", function() {
            // ดึงค่า parameter ?shop= จากหน้าเว็บเบราว์เซอร์
            const urlParams = new URLSearchParams(window.location.search);
            let shopName = urlParams.get('shop') || 'DEMOPOS'; // หากไม่ได้ระบุร้าน ระบบจะวิ่งเข้าหาแท็บ DEMOPOS เป็นอันดับแรก

            // ประกอบโครงสร้าง API เพื่อส่ง Parameter ไปยัง Google Apps Script ของคุณ
            const FINAL_API_URL = `${Master_GAS_URL}?action=getHubConfig&shop=${encodeURIComponent(shopName)}`;

            fetch(FINAL_API_URL)
                .then(response => response.json())
                .then(res => {
                    if (res.status === "success") {
                        const config = res.data;
                        const internalGrid = document.getElementById('internalGrid');
                        const guestGrid = document.getElementById('guestGrid');

                        // เคลียร์พื้นที่ Grid ดั้งเดิมเพื่อป้องกันข้อมูลซ้ำซ้อน
                        internalGrid.innerHTML = '';
                        guestGrid.innerHTML = '';

                        // เปลี่ยนชื่อหัวข้อหลักของร้านค้าตามแท็บที่เรียกใช้งานจริงใน Google Sheet
                        if(shopName !== 'DEMOPOS') {
                            document.getElementById('shopTitleDisplay').innerText = res.shop;
                            document.getElementById('footerShopName').innerText = res.shop.toUpperCase();
                        }

                        // วนลูปสร้างกล่องเมนูฟังก์ชันบริการ
                        Object.keys(config).forEach(key => {
                            const item = config[key];
                            const cardElement = createCard(item);
                            
                            if (item.type === "staff") {
                                internalGrid.appendChild(cardElement);
                            } else if (item.type === "customer") {
                                guestGrid.appendChild(cardElement);
                            }
                        });

                        // ปิดหน้าจอประมวลผล (Loader) และเปิดหน้าคอนเทนเนอร์แบบนุ่มนวล
                        document.getElementById('loader').style.opacity = '0';
                        setTimeout(() => {
                            document.getElementById('loader').style.display = 'none';
                            document.getElementById('mainContainer').classList.add('loaded');
                        }, 500);
                    } else {
                        alert("เกิดข้อผิดพลาดในการดึงข้อมูลจากชีต: " + res.msg);
                    }
                })
                .catch(err => {
                    alert("การเชื่อมต่อล้มเหลว กรุณาตรวจสอบการแชร์หรือสิทธิ์การเข้าถึงลิงก์ Web App");
                    console.error(err);
                });
        });
    </script>
</body>
</html>
