<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MANAGEMENT HUB — Digital Services Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #F8FAFC; --panel-bg: #FFFFFF; --primary: #00796B;
            --text-main: #0F172A; --text-muted: #64748B; --border-color: #E2E8F0;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
            --shadow-xl: 0 20px 25px -5px rgba(15, 23, 42, 0.15), 0 10px 10px -5px rgba(15, 23, 42, 0.05);
        }

        body {
            font-family: 'Prompt', sans-serif; background-color: var(--bg-main);
            margin: 0; padding: 0; color: var(--text-main);
            min-height: 100vh; display: flex; flex-direction: column;
            overflow-x: hidden; overflow-y: auto; 
            -webkit-text-size-adjust: 100%; -webkit-tap-highlight-color: transparent;
        }

        /* Header & Clock */
        .header { text-align: center; padding: 30px 20px 20px; background-color: var(--panel-bg); border-bottom: 1px solid var(--border-color); box-shadow: var(--shadow-sm); flex-shrink: 0; position: relative; z-index: 10; }
        .header .logo-text { font-weight: 600; font-size: clamp(1.5rem, 4vh, 2rem); margin: 0; color: var(--text-main); text-transform: uppercase; }
        .header .accent-line { width: 50px; height: 2px; background-color: var(--primary); margin: 10px auto; opacity: 0.5; border-radius: 2px; }
        .header p { margin: 0; font-size: clamp(0.7rem, 1.5vh, 0.85rem); color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; }
        
        .datetime-wrapper { position: absolute; top: 25px; right: 30px; text-align: right; background: rgba(255, 255, 255, 0.9); padding: 8px 16px; border-radius: 12px; border: 1px solid var(--border-color); box-shadow: var(--shadow-sm); z-index: 10; }
        .time-txt { font-size: 1.15rem; font-weight: 700; color: var(--primary); margin-bottom: 2px; font-variant-numeric: tabular-nums; }
        .date-txt { font-size: 0.75rem; color: var(--text-muted); font-weight: 500; }
        
        @media (max-width: 768px) {
            .datetime-wrapper { position: static; margin: 0 auto 15px auto; text-align: center; padding: 0; border: none; box-shadow: none; background: transparent; }
            .time-txt { font-size: 1rem; } .date-txt { font-size: 0.7rem; }
        }

        /* Container & Cards */
        .container { max-width: 1200px; width: 100%; margin: 0 auto; padding: 30px 20px 40px; box-sizing: border-box; flex: 1; opacity: 0; transition: opacity 0.4s ease; }
        .container.loaded { opacity: 1; }
        .hub-section { margin-bottom: 30px; display: flex; flex-direction: column; }
        .section-header { font-size: clamp(0.8rem, 2vh, 1rem); font-weight: 600; color: var(--primary); margin-bottom: 20px; display: flex; align-items: center; gap: 12px; text-transform: uppercase;}
        .section-header::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--border-color), transparent); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; justify-content: center; }
        
        /* 🌟 แก้ไขสีตัวอักษรให้เป็นสีดำสนิทเสมอ (ไม่เป็นสีน้ำเงินแบบลิงก์) */
        .card { 
            background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 16px; 
            padding: 20px 10px; display: flex; flex-direction: column; align-items: center; 
            text-align: center; transition: all 0.2s; position: relative; box-shadow: var(--shadow-sm); 
            cursor: pointer; 
            text-decoration: none !important; /* ป้องกันเส้นใต้ลิงก์ */
            color: var(--text-main) !important; /* บังคับอักษรสีดำ */
        }
        .card:hover { transform: translateY(-3px) scale(1.02); box-shadow: var(--shadow-md); border-color: var(--primary); color: var(--text-main) !important; }
        .card:active { transform: scale(0.97); }
        .card.disabled { background-color: #F1F5F9; opacity: 0.6; cursor: not-allowed; box-shadow: none; }
        
        .card-meta { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; align-items: center; pointer-events: none; }
        .card-badge { font-size: 0.65rem; color: var(--primary); padding: 2px 8px; border-radius: 12px; font-weight: 600; background: #E6F4F1; text-transform: uppercase; }
        .btn-share { background: transparent; border: none; color: var(--text-muted); font-size: 1rem; cursor: pointer; pointer-events: auto; padding: 0; transition: transform 0.2s; }
        .card-icon { font-size: clamp(2.2rem, 5vh, 2.8rem); margin: 15px 0 10px 0; }
        
        /* 🌟 บังคับหัวข้อการ์ดเป็นสีดำ */
        .card-title { font-size: 0.9rem; font-weight: 600; margin: 0; color: var(--text-main) !important; }

        /* ================================ */
        /* 🌟 ระบบ MULTI-WINDOW MANAGER */
        /* ================================ */
        .os-window {
            position: fixed;
            background: #FFFFFF;
            border-radius: 14px;
            box-shadow: var(--shadow-xl);
            border: 1px solid rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: transform 0.2s, opacity 0.2s, width 0.3s, height 0.3s;
            opacity: 0;
            transform: scale(0.95);
        }
        
        .os-window.show { opacity: 1; transform: scale(1); }
        .os-window.is-dragging iframe { pointer-events: none; }
        .os-window.is-dragging { opacity: 0.9; transition: none; }

        /* ขนาดเริ่มต้น */
        @media (min-width: 769px) {
            .os-window { width: 85%; max-width: 1000px; height: 80vh; max-height: 700px; }
        }
        
        /* มือถือเปิดเต็มจอเสมอ */
        @media (max-width: 768px) {
            .os-window { top: 0 !important; left: 0 !important; width: 100vw !important; height: 100vh !important; border-radius: 0; }
        }

        /* โหมดขยายเต็มจอด้วยปุ่มสีเขียว */
        .os-window.fullscreen { top: 0 !important; left: 0 !important; width: 100vw !important; height: 100vh !important; border-radius: 0 !important; max-width: none !important; max-height: none !important; }

        /* 🌟 โหมดย่อหน้าต่างด้วยปุ่มสีเหลือง */
        .os-window.minimized {
            height: 48px !important;
            min-height: 48px !important;
            width: 260px !important;
            top: auto !important;
            bottom: 20px !important;
            border-radius: 12px !important;
            transform: none !important;
            cursor: pointer;
        }
        .os-window.minimized .os-body { display: none !important; }
        .os-window.minimized .os-header { background: #E2E8F0; }

        .os-header { padding: 12px 16px; background: #F8FAFC; border-bottom: 1px solid #E2E8F0; display: flex; align-items: center; cursor: grab; user-select: none; }
        .os-header:active { cursor: grabbing; }

        .mac-controls { display: flex; gap: 8px; margin-right: 15px; }
        .mac-dot { width: 13px; height: 13px; border-radius: 50%; border: none; cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: bold; color: transparent; transition: 0.15s; }
        .mac-controls:hover .mac-dot { color: rgba(0,0,0,0.5); }
        .mac-close { background-color: #FF5F56; }
        
        /* 🌟 สีปุ่มย่อหน้าต่าง (สีเหลือง) */
        .mac-minimize { background-color: #FFBD2E; }
        
        .mac-expand { background-color: #27C93F; }

        .os-header h3 { margin: 0; font-size: 0.9rem; font-weight: 500; color: #0F172A; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; pointer-events: none; }
        .os-body { flex: 1; width: 100%; height: 100%; background-color: #FAFAFA; position: relative; }
        .os-iframe { width: 100%; height: 100%; border: none; display: block; }

        .footer { text-align: center; padding: 20px; font-size: 0.8rem; color: var(--text-muted); border-top: 1px solid var(--border-color); flex-shrink: 0; }
        
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #FFFFFF; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999999; }
        .spinner { width: 36px; height: 36px; border: 3px solid #E2E8F0; border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader"><div class="spinner"></div></div>

    <div class="header">
        <!-- ⏰ กล่องนาฬิกา Real-time -->
        <div class="datetime-wrapper" id="liveClockWidget">
            <div class="time-txt" id="liveTime">00:00:00</div>
            <div class="date-txt" id="liveDate">ว/ด/ป</div>
        </div>
        <h1 class="logo-text" id="shopTitleDisplay">MANAGEMENT HUB</h1>
        <div class="accent-line"></div>
        <p>Digital Services Platform</p>
    </div>

    <div class="container" id="mainContainer">
        <div class="hub-section">
            <div class="section-header">Internal Management</div>
            <div class="grid" id="internalGrid"></div>
        </div>
        <div class="hub-section" id="guestSection" style="display: none;">
            <div class="section-header">Guest Services</div>
            <div class="grid" id="guestGrid"></div>
        </div>
    </div>

    <!-- โกดังเก็บหน้าต่างที่เปิดขึ้นมา (Window Manager Area) -->
    <div id="windowArea"></div>

    <div class="footer">&copy; 2026 <span id="footerShopName">DEMOPOS</span>. All Rights Reserved.</div>

    <script>
        const Master_GAS_URL = "https://script.google.com/macros/s/AKfycbxrJzwwtaV39NFkc_LH3gkj_wEZjC9fw_e6SZei89tG3GVYuW45pkMCyWu32j6v2v4/exec";

        // ⏰ ระบบนาฬิกา
        function updateClock() {
            const now = new Date();
            document.getElementById('liveTime').innerText = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
            document.getElementById('liveDate').innerText = now.toLocaleDateString('th-TH', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }
        setInterval(updateClock, 1000); updateClock();

        // ฟังก์ชันสร้างปุ่มเมนูหลัก
        function createCard(key, data) {
            const card = document.createElement('a');
            card.className = `card ${!data.active ? 'disabled' : ''}`;
            card.href = "javascript:void(0)";
            
            if (data.active) {
                card.onclick = function() { spawnWindow(data.url, data.title, key); };
            } else {
                card.onclick = function() { alert(data.errorMsg); };
            }

            card.innerHTML = `
                <div class="card-meta">
                    <span class="card-badge">${!data.active ? 'Maintenance' : data.badge}</span>
                </div>
                <div class="card-icon">${data.icon}</div>
                <h3 class="card-title">${data.title}</h3>
            `;
            return card;
        }

        // ================================
        // 🌟 ระบบ MULTI-WINDOW MANAGER
        // ================================
        
        let highestZIndex = 1000;
        let windowOffset = 0; 
        let minimizedCount = 0; // นับจำนวนหน้าต่างที่ถูกย่อเพื่อจัดเรียง

        function spawnWindow(url, title, key) {
            const winArea = document.getElementById('windowArea');
            const winId = 'win_' + Date.now();
            highestZIndex++;
            windowOffset += 20;
            if(windowOffset > 100) windowOffset = 0; 

            const win = document.createElement('div');
            win.className = 'os-window';
            win.id = winId;
            win.style.zIndex = highestZIndex;

            if(window.innerWidth > 768) {
                win.style.top = (50 + windowOffset) + "px";
                win.style.left = (50 + windowOffset) + "px";
            }

            let lowerKey = String(key).toLowerCase();
            let lowerUrl = String(url).toLowerCase();
            if (lowerKey.includes('pos') || lowerKey.includes('stock') || lowerUrl.includes('pos')) {
                win.classList.add('fullscreen');
            }

            // 🌟 เพิ่มปุ่ม mac-minimize (สีเหลือง) กลับเข้ามาในโครงสร้าง
            win.innerHTML = `
                <div class="os-header" id="header_${winId}">
                    <div class="mac-controls">
                        <button class="mac-dot mac-close" onclick="closeWindow('${winId}', event)" title="ปิดหน้าต่าง">✕</button>
                        <button class="mac-dot mac-minimize" onclick="toggleMinimize('${winId}', event)" title="พับเก็บหน้าต่าง">⎯</button>
                        <button class="mac-dot mac-expand" onclick="toggleMaximize('${winId}', event)" title="ย่อ/ขยายเต็มจอ">⤢</button>
                    </div>
                    <h3>${title}</h3>
                </div>
                <div class="os-body">
                    <iframe class="os-iframe" src="${url}" allow="camera *; geolocation *; microphone *; autoplay;"></iframe>
                </div>
            `;

            winArea.appendChild(win);

            // เมื่อคลิกที่หน้าต่าง ให้เด้งมาอยู่หน้าสุด
            win.addEventListener('mousedown', () => {
                if(!win.classList.contains('minimized')) {
                    highestZIndex++;
                    win.style.zIndex = highestZIndex;
                }
            });
            win.addEventListener('touchstart', () => {
                if(!win.classList.contains('minimized')) {
                    highestZIndex++;
                    win.style.zIndex = highestZIndex;
                }
            });

            makeDraggable(win, document.getElementById('header_' + winId));
            setTimeout(() => win.classList.add('show'), 10);
        }

        // 🔴 ปิดหน้าต่าง (ปุ่มแดง)
        function closeWindow(winId, event) {
            if(event) event.stopPropagation();
            const win = document.getElementById(winId);
            if(win) {
                win.classList.remove('show');
                setTimeout(() => win.remove(), 250); 
            }
        }

        // 🟢 ขยายเต็มจอ (ปุ่มเขียว)
        function toggleMaximize(winId, event) {
            if(event) event.stopPropagation();
            const win = document.getElementById(winId);
            if(win && !win.classList.contains('minimized')) {
                win.classList.toggle('fullscreen');
            }
        }

        // 🟡 ย่อหน้าต่างเก็บไว้ด้านล่าง (ปุ่มเหลือง)
        function toggleMinimize(winId, event) {
            if(event) event.stopPropagation();
            const win = document.getElementById(winId);
            if(win) {
                if(win.classList.contains('minimized')) {
                    // เปิดกลับมา
                    win.classList.remove('minimized');
                    win.style.left = win.dataset.oldLeft || "50px";
                    highestZIndex++; win.style.zIndex = highestZIndex;
                } else {
                    // ย่อเก็บ
                    win.dataset.oldLeft = win.style.left; // จำตำแหน่งเดิมไว้
                    win.classList.add('minimized');
                    // จัดเรียงหน้าต่างที่ย่อไม่ให้ทับกัน
                    const minWins = document.querySelectorAll('.os-window.minimized');
                    const offsetLeft = 20 + ((minWins.length - 1) * 270);
                    win.style.left = offsetLeft + "px";
                }
            }
        }

        // 🖱️ ระบบลากหน้าต่าง
        function makeDraggable(win, header) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            
            header.onmousedown = dragMouseDown;
            header.ontouchstart = dragTouchDown;

            // เมื่อคลิกที่แถบ Header ถ้าย่ออยู่ให้ขยายกลับมา
            header.onclick = function() {
                if(win.classList.contains('minimized')) {
                    toggleMinimize(win.id);
                }
            };

            function dragMouseDown(e) {
                if(win.classList.contains('fullscreen') || win.classList.contains('minimized')) return;
                e.preventDefault();
                highestZIndex++; win.style.zIndex = highestZIndex;
                pos3 = e.clientX; pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
                win.classList.add('is-dragging'); 
            }

            function dragTouchDown(e) {
                if(win.classList.contains('fullscreen') || win.classList.contains('minimized')) return;
                highestZIndex++; win.style.zIndex = highestZIndex;
                pos3 = e.touches[0].clientX; pos4 = e.touches[0].clientY;
                document.ontouchend = closeDragElement;
                document.ontouchmove = elementDragTouch;
                win.classList.add('is-dragging');
            }

            function elementDrag(e) {
                e.preventDefault();
                pos1 = pos3 - e.clientX; pos2 = pos4 - e.clientY;
                pos3 = e.clientX; pos4 = e.clientY;
                win.style.top = (win.offsetTop - pos2) + "px";
                win.style.left = (win.offsetLeft - pos1) + "px";
            }

            function elementDragTouch(e) {
                pos1 = pos3 - e.touches[0].clientX; pos2 = pos4 - e.touches[0].clientY;
                pos3 = e.touches[0].clientX; pos4 = e.touches[0].clientY;
                win.style.top = (win.offsetTop - pos2) + "px";
                win.style.left = (win.offsetLeft - pos1) + "px";
            }

            function closeDragElement() {
                document.onmouseup = null; document.onmousemove = null;
                document.ontouchend = null; document.ontouchmove = null;
                win.classList.remove('is-dragging'); 
            }
        }

        // ================================

        window.handleHubResponse = function(res) {
            if (res && res.status === "success") {
                const config = res.data;
                const internalGrid = document.getElementById('internalGrid');
                const guestGrid = document.getElementById('guestGrid');

                internalGrid.innerHTML = ''; guestGrid.innerHTML = '';
                let hasGuestItems = false;

                document.getElementById('shopTitleDisplay').innerText = res.shop;
                document.getElementById('footerShopName').innerText = res.shop.toUpperCase();

                Object.keys(config).forEach(key => {
                    const item = config[key];
                    const card = createCard(key, item);
                    if (item.type === "staff") internalGrid.appendChild(card);
                    else if (item.type === "customer") { guestGrid.appendChild(card); hasGuestItems = true; }
                });

                if(hasGuestItems) document.getElementById('guestSection').style.display = "flex";

                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('mainContainer').classList.add('loaded');
                }, 400);
            } else {
                alert("เกิดข้อผิดพลาด: " + (res ? res.msg : 'Unknown'));
            }
        };

        document.addEventListener("DOMContentLoaded", function() {
            const urlParams = new URLSearchParams(window.location.search);
            const shopName = urlParams.get('shop') || 'DEMOPOS';
            const connector = Master_GAS_URL.includes('?') ? '&' : '?';
            const script = document.createElement('script');
            script.src = `${Master_GAS_URL}${connector}action=getHubConfig&shop=${encodeURIComponent(shopName)}&callback=handleHubResponse`;
            document.body.appendChild(script);
        });
    </script>
</body>
</html>
